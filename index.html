<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>טופס בדק דירה - כניסות 17 / 19</title>
<style>
:root {
  --green:#006b57;
  --green2:#007d67;
  --bg:#eef5f2;
  --card:#ffffff;
  --line:#d9e5e0;
  --text:#17332d;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family: Arial, "Noto Sans Hebrew", sans-serif;
  background:var(--bg);
  color:var(--text);
  direction:rtl;
}
header {
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:white;
  padding:18px 14px;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
}
h1 { margin:0; font-size:20px; }
.container { max-width:980px; margin:0 auto; padding:12px; }
.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin:12px 0;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.grid {
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
@media (max-width:700px) {
  .grid { grid-template-columns:1fr; }
}
label { display:block; font-weight:700; margin-bottom:5px; }
input, select, textarea, button {
  width:100%;
  font:inherit;
  border-radius:12px;
  border:1px solid #cbd9d4;
  padding:10px;
  background:#fff;
}
textarea { min-height:72px; resize:vertical; }
button {
  cursor:pointer;
  border:0;
  background:var(--green);
  color:white;
  font-weight:700;
}
button.secondary { background:#e7f0ed; color:var(--green); border:1px solid #cbd9d4; }
button.danger { background:#d92323; }
.room-title {
  background:#e9f4f0;
  color:var(--green);
  border-radius:14px;
  padding:10px 12px;
  font-weight:800;
  margin-top:14px;
}
.item-card {
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  margin:10px 0;
  background:#fff;
}
.item-head {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}
.item-name { font-weight:800; font-size:16px; }
.row {
  display:grid;
  grid-template-columns: 180px 1fr 170px;
  gap:8px;
  align-items:start;
}
@media (max-width:760px) {
  .row { grid-template-columns:1fr; }
}
.photo-list {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
}
.photo-box {
  position:relative;
  width:130px;
  height:100px;
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
  background:#f8fbfa;
}
.photo-box img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.photo-caption {
  position:absolute;
  right:0;
  left:0;
  bottom:0;
  background:rgba(0,0,0,.62);
  color:white;
  font-size:11px;
  line-height:1.25;
  padding:4px 5px;
  text-align:right;
}
.photo-remove {
  position:absolute;
  top:4px;
  left:4px;
  width:24px;
  height:24px;
  padding:0;
  border-radius:50%;
  background:#d92323;
  color:#fff;
  font-size:14px;
}
.actions {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
@media (max-width:700px) {
  .actions { grid-template-columns:1fr; }
}
.small { color:#60736d; font-size:12px; }
@media print {
  header, .actions, input[type=file], button, .top-controls { display:none !important; }
  body { background:#fff; }
  .card, .item-card { box-shadow:none; break-inside:avoid; }
}
</style>
</head>
<body>
<header>
  <h1>טופס בדק דירה - כניסות 17 / 19</h1>
  <div class="small" style="color:#eafff8">שמירה מקומית בדפדפן + תמונות עם כיתוב על התמונה</div>
</header>

<div class="container">
  <section class="card top-controls">
    <div class="grid">
      <div>
        <label>כניסה</label>
        <select id="entry">
          <option value="17">כניסה 17</option>
          <option value="19">כניסה 19</option>
        </select>
      </div>
      <div>
        <label>דירה</label>
        <select id="apt"></select>
      </div>
      <div>
        <label>שם הבודק</label>
        <input id="inspector" placeholder="שם הבודק">
      </div>
      <div>
        <label>תאריך</label>
        <input id="date" type="date">
      </div>
    </div>
  </section>

  <section id="form" class="card"></section>

  <section class="card actions">
    <button onclick="saveData()">שמור</button>
    <button class="secondary" onclick="window.print()">הדפס / PDF</button>
    <button class="secondary" onclick="downloadBackup()">גיבוי JSON</button>
    <button class="secondary" onclick="document.getElementById('restoreFile').click()">שחזור מגיבוי</button>
    <input id="restoreFile" type="file" accept="application/json" style="display:none" onchange="restoreBackup(event)">
    <button class="secondary" onclick="clearApartment()">נקה דירה נוכחית</button>
    <button class="danger" onclick="clearAll()">איפוס כל הטפסים</button>
  </section>
</div>

<script>
const ROOMS = ["מטבח", "סלון", "חדר שינה 1", "הורים", "ילדים", "רחצה כללי", "מרפסת שרות"];
const ITEMS = ["ארונות מטבח", "שיש מטבח", "סורגים", "אלומיניום - מידות וסוג", "רשת יתושים", "סדקים בקירות", "מז\"א", "ריצוף סוג ותקינות", "דלת פנים", "כלים סניטריים", "שונות"];
const STORE_KEY = "bedek_entries_17_19_clean_v8";
let state = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
let currentRoom = null;

function todayISO() {
  return new Date().toISOString().slice(0,10);
}

function aptKey() {
  return "כניסה " + document.getElementById("entry").value + " - דירה " + document.getElementById("apt").value;
}

function initApts() {
  const apt = document.getElementById("apt");
  apt.innerHTML = "";
  for (let i=1;i<=8;i++) {
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = "דירה " + i;
    apt.appendChild(opt);
  }
}

function blankApartment() {
  const cells = {};
  for (const room of ROOMS) {
    for (const item of ITEMS) {
      const key = room + "||" + item;
      cells[key] = { status:"", note:"", photos:[] };
    }
  }
  return { inspector:"", date:todayISO(), cells };
}

function ensureApartment() {
  const key = aptKey();
  if (!state[key]) state[key] = blankApartment();
  return state[key];
}

function cellKey(room,item) {
  return room + "||" + item;
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));
}

function render() {
  const data = ensureApartment();
  document.getElementById("inspector").value = data.inspector || "";
  document.getElementById("date").value = data.date || todayISO();

  let html = `<h2>${esc(aptKey())}</h2>`;

  if (!currentRoom) {
    html += `<div class="small">בחר חדר לבדיקה:</div><div class="room-menu">`;
    for (const room of ROOMS) {
      html += `<button class="room-btn" onclick="openRoom('${esc(room)}')">${esc(room)}</button>`;
    }
    html += `</div>`;
    document.getElementById("form").innerHTML = html;
    return;
  }

  html += `<button class="secondary back-btn" onclick="backToRooms()">חזרה לרשימת חדרים</button>`;
  html += `<div class="room-title">${esc(currentRoom)}</div>`;

  const room = currentRoom;
  for (const item of ITEMS) {
    if ((item === "ארונות מטבח" || item === "שיש מטבח") && room !== "מטבח") continue;
    if (item === "כלים סניטריים" && room !== "רחצה כללי") continue;

    const key = cellKey(room,item);
    const cell = data.cells[key] || {status:"",note:"",photos:[]};
    const isYesNo = item.trim() === "סורגים" || item.trim() === "רשת יתושים";
    const options = isYesNo
      ? `<option value="">בחר</option><option value="יש" ${cell.status==="יש"?"selected":""}>יש</option><option value="אין" ${cell.status==="אין"?"selected":""}>אין</option>`
      : `<option value="">בחר סטטוס</option><option value="תקין" ${cell.status==="תקין"?"selected":""}>תקין</option><option value="ליקוי" ${cell.status==="ליקוי"?"selected":""}>ליקוי</option><option value="לא רלוונטי" ${cell.status==="לא רלוונטי"?"selected":""}>לא רלוונטי</option>`;

    html += `
    <div class="item-card">
      <div class="item-head"><div class="item-name">${esc(item)}</div></div>
      <div class="row">
        <select onchange="setStatus('${esc(key)}', this.value)">${options}</select>
        <textarea placeholder="הערות" oninput="setNote('${esc(key)}', this.value)">${esc(cell.note)}</textarea>
        <div>
          <input type="file" accept="image/*" capture="environment" onchange="addPhoto('${esc(key)}', event)">
          <div class="small">${(cell.photos||[]).length} תמונות</div>
          <div class="photo-list">
            ${(cell.photos||[]).map((p,idx)=>`
              <div class="photo-box">
                <img src="${p.data}">
                <div class="photo-caption">${esc(p.caption)}</div>
                <button class="photo-remove" onclick="removePhoto('${esc(key)}', ${idx})">×</button>
              </div>
            `).join("")}
          </div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById("form").innerHTML = html;
}

function openRoom(room) {
  currentRoom = room;
  render();
}

function backToRooms() {
  currentRoom = null;
  render();
}

function saveMeta() {
  const data = ensureApartment();
  data.inspector = document.getElementById("inspector").value.trim();
  data.date = document.getElementById("date").value || todayISO();
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function setStatus(key,val) {
  ensureApartment().cells[key].status = val;
  saveMeta();
}

function setNote(key,val) {
  ensureApartment().cells[key].note = val;
  saveMeta();
}

function addPhoto(key,event) {
  const file = event.target.files[0];
  if (!file) return;
  saveMeta();
  const data = ensureApartment();
  const entry = document.getElementById("entry").value;
  const apt = document.getElementById("apt").value;
  const date = document.getElementById("date").value || todayISO();
  const caption = `כניסה ${entry} | דירה ${apt} | ${date}`;

  const reader = new FileReader();
  reader.onload = e => {
    data.cells[key].photos.push({ data:e.target.result, caption });
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    saveImageToPhone(e.target.result, caption);
    render();
  };
  reader.readAsDataURL(file);
}


function saveImageToPhone(imageData, captionText) {
  const link = document.createElement("a");
  link.href = imageData;
  const safeName = captionText.replace(/\s+/g,'_').replace(/\|/g,'-');
  link.download = safeName + ".jpg";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function removePhoto(key,idx) {
  ensureApartment().cells[key].photos.splice(idx,1);
  saveMeta();
  render();
}

function saveData() {
  saveMeta();
  alert("הטופס נשמר במכשיר");
}

function downloadBackup() {
  saveMeta();
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "backup-bedek-entries-17-19.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function restoreBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      state = JSON.parse(e.target.result);
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      render();
      alert("השחזור בוצע");
    } catch(err) {
      alert("קובץ גיבוי לא תקין");
    }
  };
  reader.readAsText(file);
}

function clearApartment() {
  if (!confirm("למחוק את הטופס של הדירה הנוכחית?")) return;
  delete state[aptKey()];
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  render();
}

function clearAll() {
  if (!confirm("למחוק את כל 16 הטפסים?")) return;
  state = {};
  localStorage.removeItem(STORE_KEY);
  render();
}

document.addEventListener("DOMContentLoaded", () => {
  initApts();
  document.getElementById("date").value = todayISO();
  document.getElementById("entry").addEventListener("change", () => { currentRoom = null; render(); });
  document.getElementById("apt").addEventListener("change", () => { currentRoom = null; render(); });
  document.getElementById("inspector").addEventListener("input", saveMeta);
  document.getElementById("date").addEventListener("change", saveMeta);
  render();
});
</script>
</body>
</html>
